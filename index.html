<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>돈쓸것 Dashboard - 27인치 4K USB-C 모니터</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>돈쓸것 Dashboard</h1>
        <p>
          조건: <strong>27인치 · 4K · USB-C 충전 가능 · MacBook용</strong>
        </p>
      </header>

      <section class="summary" aria-label="요약 정보">
        <div class="card">
          <h2>업데이트 시간</h2>
          <p id="updatedAt">-</p>
        </div>
        <div class="card">
          <h2>최저가</h2>
          <p id="lowestPrice">-</p>
        </div>
        <div class="card">
          <h2>조건 일치 제품 수</h2>
          <p id="productCount">-</p>
        </div>
      </section>

      <section>
        <div class="toolbar">
          <label for="maxPriceInput">최대 예산(원)</label>
          <input id="maxPriceInput" type="number" min="0" placeholder="예: 500000" />
          <button id="applyFilterButton" type="button">필터 적용</button>
        </div>
      </section>

      <section>
        <h2>다나와 최저가 기준 추천 목록</h2>
        <p class="notice">
          * 데이터는 GitHub Actions 스케줄로 갱신됩니다. 기본 검색어 + 삼성/LG 검색어를 함께 수집해 보여줍니다.
        </p>
        <p id="filterDetails" class="notice"></p>
        <div id="list" class="list"></div>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="item">
        <img class="thumb" alt="" loading="lazy" />
        <h3 class="name"></h3>
        <div class="meta"></div>
        <div class="price"></div>
        <a class="link" target="_blank" rel="noreferrer noopener">다나와에서 보기</a>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
